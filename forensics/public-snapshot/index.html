<body>
    <div class="app-container">
        <!-- 主卡片 -->
        <div class="main-card">
            <div class="card-header">
                <div class="logo-title-container" style="display: flex; align-items: center;">
                    <img src="public/gw.png" class="logo-image" style="height: 40px; margin-right: 10px;">
                    <h1>XCloud音乐</h1>
                </div>
                <div class="header-controls">
                    <div class="user-area">
                        <button class="login-btn" id="login-btn"><i class="fas fa-user"></i> 登录</button>
                        <div class="user-info" style="display: none;">
                            <span class="username"></span>
                            <button class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                        </div>
                    </div>
                    <button class="status-check-btn" id="status-check-btn" title="播放源可用性检查">
                        <i class="fas fa-signal"></i> 源状态
                    </button>
                    <div class="theme-switch">
                        <i class="fas fa-sun"></i>
                        <label class="switch">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider round"></span>
                        </label>
                        <i class="fas fa-moon"></i>
                    </div>
                </div>
            </div>

            <!-- 导航栏 -->
            <nav class="main-nav">
                <ul>
                    <li class="active"><a href="#home"><i class="fas fa-home"></i> 首页</a></li>
                    <li><a href="#search"><i class="fas fa-search"></i> 搜索音乐</a></li>
                    <li><a href="#favorites"><i class="fas fa-heart"></i> 我的收藏</a></li>
                    <li><a href="#playlists"><i class="fas fa-list"></i> 我的歌单</a></li>
                </ul>
            </nav>

            <!-- 搜索区域 -->
            <div class="search-area">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索歌曲...">
                    <select class="audio-quality-select">
                        <option value="128">省流</option>
                        <option value="192">标准</option>
                        <option value="320" selected>极高[HQ]</option>
                        <option value="999">无损[SQ]</option>
                    </select>
                    <select class="source-select">
                        <option value="netease" selected>网易云音乐</option>
                        <option value="kuwo">酷我音乐</option>
                    </select>
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <!-- 内容区域 -->
            <div class="content-area">
            </div>
        </div>

        <!-- 播放器卡片 -->
        <div class="player-card">
            <div class="player-minimized">
                <div class="song-info">
                    <img src="" alt="专辑封面" class="album-cover">
                    <div class="song-details">
                        <div class="song-title-container">
                            <div class="song-title">未选择歌曲</div>
                            <div class="quality-icon" title="音频质量"></div>
                        </div>
                        <div class="artist-name">未知艺术家</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="prev-btn"><i class="fas fa-step-backward"></i></button>
                    <button class="play-btn"><i class="fas fa-play"></i></button>
                    <button class="next-btn"><i class="fas fa-step-forward"></i></button>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress"></div>
                            <div class="progress-handle"></div>
                        </div>
                        <div class="time-info">
                            <span class="current-time">00:00</span>
                            <span class="duration">00:00</span>
                        </div>
                    </div>
                    <button class="volume-btn"><i class="fas fa-volume-up"></i></button>
                    <input type="range" class="volume-slider" min="0" max="100" value="50">
                    <button class="play-mode-btn" data-mode="order"><i class="fas fa-stream"></i></button>
                    <button class="playlist-btn"><i class="fas fa-list"></i></button>
                    <button class="timer-btn" title="定时结束播放"><i class="fas fa-clock"></i></button>
                    <button class="player-share-btn" title="分享歌曲"><i class="fas fa-share-alt"></i></button>
                    <button class="expand-btn"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 展开的播放器模态框 -->
    <div class="expanded-player-modal">
        <div class="expanded-player-container">
            <button class="close-expanded-player"><i class="fas fa-times"></i></button>
            <div class="expanded-player-content">
                <div class="expanded-player-left">
                    <div class="expanded-album-cover-container">
                        <img src="" class="expanded-album-cover">
                    </div>
                </div>
                <div class="expanded-player-right">
                    <div class="expanded-track-info">
                        <div class="expanded-song-title-container">
                            <div class="expanded-song-title">未选择歌曲</div>
                            <div class="expanded-quality-icon" title="音频质量"></div>
                        </div>
                        <div class="expanded-artist-name">未知艺术家</div>
                    </div>
                    <div class="expanded-controls">
                        <button class="expanded-prev-btn"><i class="fas fa-step-backward"></i></button>
                        <button class="expanded-play-btn"><i class="fas fa-play"></i></button>
                        <button class="expanded-next-btn"><i class="fas fa-step-forward"></i></button>
                        <button class="expanded-play-mode-btn" data-mode="order"><i class="fas fa-stream"></i></button>
                        <button class="expanded-playlist-btn"><i class="fas fa-list"></i></button>
                        <button class="expanded-timer-btn" title="定时结束播放"><i class="fas fa-clock"></i></button>
                        <button class="expanded-player-share-btn" title="分享歌曲"><i class="fas fa-share-alt"></i></button>
                    </div>
                    <div class="expanded-progress-container">
                        <div class="expanded-progress-bar">
                            <div class="expanded-progress"></div>
                            <div class="expanded-progress-handle"></div>
                        </div>
                        <div class="expanded-time-info">
                            <span class="expanded-current-time">00:00</span>
                            <span class="expanded-duration">00:00</span>
                        </div>
                    </div>
                    <div class="expanded-volume-controls">
                        <button class="expanded-volume-btn"><i class="fas fa-volume-up"></i></button>
                        <input type="range" class="expanded-volume-slider" min="0" max="100" value="50">
                    </div>
                </div>
            </div>
            <div class="expanded-lyrics">
                <div class="expanded-lyrics-content"></div>
            </div>
        </div>
    </div>

    <!-- 登录/注册模态框 -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <ul class="tabs">
                <li class="tab active" data-tab="login">登录</li>
                <li class="tab" data-tab="register">注册</li>
            </ul>

            <div class="tab-content" id="login-tab">
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" name="username" required placeholder="请输入用户名或邮箱！">
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" name="password" required placeholder="请输入密码！">
                    </div>
                    <button type="submit" class="submit-btn">登录</button>
                    <div class="form-group" style="text-align:right;margin-top:-10px;">
                        <a href="javascript:void(0);" id="forgot-password-link" style="font-size:13px;color:#409eff;text-decoration:none;text-align: center;">忘记密码？</a>
                    </div>
                </form>
            </div>

            <div class="tab-content" id="register-tab" style="display: none;">
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="register-username">用户名</label>
                        <input type="text" id="register-username" name="username" required placeholder="在这里输入用户名（不少于5位）,用来登录哦！">
                    </div>
                    <div class="form-group">
                        <label for="register-email">邮箱</label>
                        <input type="email" id="register-email" name="email" required placeholder="请填写真实邮箱，否则无法找回密码哦！">
                    </div>
                    <div class="form-group">
                        <label for="register-code">验证码</label>
                        <div class="email-input-container">
                            <input type="text" id="register-code" name="verification_code" required placeholder="请输入邮箱验证码">
                            <button type="button" class="verification-btn" id="send-register-code">发送验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" name="password" required placeholder="在这里输入密码，请牢记哦！">
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">确认密码</label>
                        <input type="password" id="register-confirm" name="confirm_password" required placeholder="再次输一次密码吧！">
                    </div>
                    <button type="submit" class="submit-btn">注册</button>
                    <div class="register-tip">请牢记用户名和密码，邮箱用于找回密码哦！</div>
                </form>
            </div>
        </div>
    </div>

    <div id="forgot-password-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" id="forgot-password-close">&times;</span>
            <h3 style="text-align:center;">找回密码</h3>
            <form id="forgot-password-form" class="auth-form">
                <div class="form-group">
                    <label for="fp-email">注册邮箱</label>
                    <input type="email" id="fp-email" name="email" required placeholder="请输入注册邮箱">
                </div>
                <div class="form-group" style="display:flex;gap:8px;align-items:center;flex-direction: row;">
                    <input type="text" id="fp-code" name="code" placeholder="验证码" style="flex:1;">
                    <button type="button" id="fp-send-code" style="flex-shrink:0;">获取验证码</button>
                </div>
                <div class="form-group">
                    <label for="fp-new-password">新密码</label>
                    <input type="password" id="fp-new-password" name="new_password" required placeholder="请输入新密码">
                </div>
                <button type="submit" class="submit-btn">重置密码</button>
            </form>
        </div>
    </div>

    <div class="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text" id="loader-text">加载中...</div>

    <div id="share-song-modal" class="custom-modal">
        <div class="custom-modal-content share-song-content">
            <h3>检测到您的链接有被分享的歌曲，是否立即播放？</h3>
            <div class="share-song-info">
                <div class="share-song-cover">
                    <img src="" alt="歌曲封面" id="share-song-cover-img">
                </div>
                <div class="share-song-details">
                    <div class="share-song-title" id="share-song-title"></div>
                    <div class="share-song-artist" id="share-song-artist"></div>
                </div>
            </div>
            <div class="share-song-actions">
                <button class="share-song-play-btn" id="share-song-play-btn">立即播放</button>
                <button class="share-song-cancel-btn" id="share-song-cancel-btn">取消</button>
            </div>
        </div>
    </div>

    <!-- 播放源可用性检查模态框 -->
    <div id="status-check-modal" class="custom-modal">
        <div class="custom-modal-content2 status-check-content">
            <span class="custom-modal-close2" id="status-check-close">&times;</span>
            <iframe src="https://music.xcloudv.top/api_check/check_api.php" 
                    width="100%" 
                    height="314px" 
                    frameborder="0" 
                    style="border-radius: 8px; border: 1px solid var(--border-color);">
            </iframe>
        </div>
    </div>

    <!-- 定时器选择面板 -->
    <div id="timer-modal" class="custom-modal">
        <div class="custom-modal-content timer-content">
            <button class="timer-close-btn" id="timer-close-btn"><i class="fas fa-times"></i></button>
            <h3 id="timer-title">定时结束播放</h3>
            <div class="timer-options" id="timer-options">
                <button class="timer-option" data-minutes="5">5分钟</button>
                <button class="timer-option" data-minutes="10">10分钟</button>
                <button class="timer-option" data-minutes="30">30分钟</button>
                <button class="timer-option" data-minutes="60">1小时</button>
                <button class="timer-option" data-minutes="120">2小时</button>
                <button class="timer-option" data-minutes="0">自定义</button>
            </div>
            <div class="timer-custom" id="timer-custom" style="display: none;">
                <div class="timer-input-group">
                    <label for="timer-hours">小时：</label>
                    <input type="number" id="timer-hours" min="0" max="23" value="0">
                </div>
                <div class="timer-input-group">
                    <label for="timer-minutes">分钟：</label>
                    <input type="number" id="timer-minutes" min="0" max="59" value="5">
                </div>
            </div>
            <div class="timer-actions" id="timer-actions">
                <button class="timer-start-btn" id="timer-start-btn">开始定时</button>
                <button class="timer-cancel-btn" id="timer-cancel-btn">取消</button>
            </div>
            <div class="timer-status" id="timer-status" style="display: none;">
                <div class="timer-countdown" id="timer-countdown">剩余时间：00:00</div>
                <div class="timer-progress-container">
                    <div class="timer-progress-bar">
                        <div class="timer-progress" id="timer-progress"></div>
                    </div>
                </div>
                <div class="timer-status-actions">
                    <button class="timer-stop-btn" id="timer-stop-btn">停止定时</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js?v=1.7.2" defer></script>
    <script src="js/util.js?v=1.7.1"></script>
    <script src="js/email_verification.js?v=1.7.1" defer></script>
    <script src="js/delete_joox.js?v=1.7.1" defer></script>
